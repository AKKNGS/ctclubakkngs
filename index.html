<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងសិស្ស</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90E2">
</head>
<body>

    <div id="login-container" class="container active">
        <div class="card login-card">
            <h2>ចូលប្រើប្រាស់ (Login)</h2>
            <input type="text" id="username" placeholder="ឈ្មោះគណនី (admin)">
            <input type="password" id="password" placeholder="លេខសម្ងាត់ (1234)">
            <button onclick="login()">ចូល (Login)</button>
            <p id="login-error" class="error"></p>
        </div>
    </div>

    <div id="dashboard-container" class="container">
        <div class="header">
            <h2>ទិន្នន័យសិស្ស (Admin)</h2>
            <button class="logout-btn" onclick="logout()">ចាកចេញ</button>
        </div>
        
        <div class="card table-responsive">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>លរ</th>
                        <th>ឈ្មោះ</th>
                        <th>ភេទ</th>
                        <th>ថ្នាក់</th>
                        <th>កំណត់សម្គាល់</th>
                        <th>សកម្មភាព</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
            <div id="loading" class="loading">កំពុងទាញយកទិន្នន័យ...</div>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>កែប្រែទិន្នន័យ</h3>
            <input type="hidden" id="edit-id">
            <label>ឈ្មោះ៖</label>
            <input type="text" id="edit-name">
            <label>ភេទ៖</label>
            <input type="text" id="edit-gender">
            <label>ថ្នាក់៖</label>
            <input type="text" id="edit-class">
            <label>កំណត់សម្គាល់៖</label>
            <input type="text" id="edit-note">
            <div class="modal-actions">
                <button onclick="saveData()" class="save-btn">រក្សាទុក</button>
                <button onclick="closeModal()" class="cancel-btn">បោះបង់</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
