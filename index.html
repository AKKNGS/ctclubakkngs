<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ប្រព័ន្ធគ្រប់គ្រងសិស្ស</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
</head>
<body>

    <header class="app-header">
        <div class="logo-title">
            <span class="material-symbols-outlined">school</span>
            <h1>បញ្ជីសិស្ស</h1>
        </div>
        <button id="auth-btn" class="icon-btn" onclick="toggleLoginModal()">
            <span class="material-symbols-outlined" id="auth-icon">login</span>
        </button>
    </header>

    <main class="app-content">
        <div id="loading" class="loading">
            <span class="material-symbols-outlined spin">sync</span> កំពុងទាញយកទិន្នន័យ...
        </div>
        
        <div id="student-list" class="card-list"></div>
    </main>

    <div id="login-modal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>ចូលប្រើប្រាស់ (Admin)</h2>
                <button class="close-btn" onclick="toggleLoginModal()"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <span class="material-symbols-outlined">person</span>
                    <input type="text" id="username" placeholder="ឈ្មោះគណនី">
                </div>
                <div class="input-group">
                    <span class="material-symbols-outlined">lock</span>
                    <input type="password" id="password" placeholder="លេខសម្ងាត់">
                </div>
                <p id="login-error" class="error-msg"></p>
                <button class="primary-btn" onclick="login()">ចូល (Login)</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>កែប្រែព័ត៌មាន</h2>
                <button class="close-btn" onclick="closeEditModal()"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="input-box"><label>ឈ្មោះ៖</label><input type="text" id="edit-name"></div>
                <div class="input-box"><label>ភេទ៖</label><input type="text" id="edit-gender"></div>
                <div class="input-box"><label>ថ្នាក់៖</label><input type="text" id="edit-class"></div>
                <div class="input-box"><label>កំណត់សម្គាល់៖</label><input type="text" id="edit-note"></div>
                
                <div class="modal-actions">
                    <button class="cancel-btn" onclick="closeEditModal()">បោះបង់</button>
                    <button class="save-btn" onclick="saveData()">រក្សាទុក</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
